name: MLB Bot Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run health checks
        env:
          ACUNA_BOT_HEALTH_URL: ${{ secrets.ACUNA_BOT_HEALTH_URL }}
          DONTJINX_BOT_HEALTH_URL: ${{ secrets.DONTJINX_BOT_HEALTH_URL }}
          TRACKER_BOT_HEALTH_URL: ${{ secrets.TRACKER_BOT_HEALTH_URL }}
        run: node scripts/health-check.js

      - name: Commit updated status.json
        run: |
          git config user.name  "MLB Bot Monitor"
          git config user.email "monitor@github-actions"
          git add public/status.json
          git diff --staged --quiet || git commit -m "chore: update bot status [skip ci]"
          git push

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
